services:
  postgres:
    image: postgres:16
    container_name: odt-postgres
    environment:
      POSTGRES_DB: otwarte_dane_transportowe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5420:5432"
    volumes:
      - odt_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: odt-web
    user: "${UID:-1000}:${GID:-1000}"
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: otwarte_dane_transportowe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      # Optional
      DJANGO_SETTINGS_MODULE: OtwarteDaneTransportowe.settings
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  odt_pgdata:
