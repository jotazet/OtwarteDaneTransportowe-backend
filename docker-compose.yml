services:
  postgres:
    image: postgres:16
    container_name: odt-postgres
    environment:
      POSTGRES_DB: otwarte_dane_transportowe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5420:5432"
    volumes:
      - odt_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: odt-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    container_name: odt-web
    user: "${UID:-1000}:${GID:-1000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DB: otwarte_dane_transportowe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DJANGO_SETTINGS_MODULE: OtwarteDaneTransportowe.settings
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  celery_worker:
    build: .
    container_name: odt-celery-worker
    restart: unless-stopped
    # user: "${UID:-1000}:${GID:-1000}"  # Uncomment this line to run as non-root user
    # Mount docker socket to allow running sibling containers (DinD/DooD)
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      bash -lc "python manage.py migrate && celery -A OtwarteDaneTransportowe worker
      --loglevel=info
      --queues=feeds,default
      --concurrency=4"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DB: otwarte_dane_transportowe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DJANGO_SETTINGS_MODULE: OtwarteDaneTransportowe.settings
      UID: "${UID:-1000}"
      GID: "${GID:-1000}"
      C_FORCE_ROOT: '1'  # Allow running celery as root
      HOST_PROJECT_PATH: "${PWD}" # Path on host for DinD mounts
      HOST_MEDIA_ROOT: "${PWD}/uploaded_data"

  celery_beat:
    build: .
    container_name: odt-celery-beat
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    # DatabaseScheduler — harmonogram trzymany w PostgreSQL (tabela PeriodicTask)
    command: >
      bash -lc "python manage.py migrate && celery -A OtwarteDaneTransportowe beat
      --loglevel=info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DB: otwarte_dane_transportowe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DJANGO_SETTINGS_MODULE: OtwarteDaneTransportowe.settings
    volumes:
      - .:/app

  gtfs-realtime-validator:
    image: ghcr.io/mobilitydata/gtfs-realtime-validator:latest
    container_name: gtfs-realtime-validator
    ports:
      - "8082:8080"
    restart: unless-stopped

volumes:
  odt_pgdata:
