# App secrets and Django config are loaded from .env via env_file (not ${VAR}
# interpolation) so passwords/keys may contain '$' without breaking Compose.
x-app-env: &app-env
  HOME: /app
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  # Shared cache: required so the realtime self-scheduling lock and DRF throttling
  # work across web + worker processes (per-process LocMemCache would break them).
  REDIS_CACHE_URL: redis://redis:6379/2

x-app-service: &app-service
  build: .
  restart: unless-stopped
  user: "${UID:-1000}:${GID:-1000}"
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  env_file:
    - path: .env.example
      required: false
    - path: .env
      required: false
  environment:
    <<: *app-env
  volumes:
    - .:/app

services:
  # Bind-mounted project dir often yields root-owned uploaded_data; app runs as UID:GID.
  init_uploads:
    image: alpine:3.20
    container_name: odt-init-uploads
    restart: "no"
    volumes:
      - .:/app
    environment:
      TARGET_UID: "${UID:-1000}"
      TARGET_GID: "${GID:-1000}"
    # Script avoids Compose $$ escaping bugs with ${...} in inline YAML.
    command: ["sh", "/app/scripts/docker-init-uploads.sh"]

  postgres:
    image: postgres:16
    container_name: odt-postgres
    restart: unless-stopped
    env_file:
      - path: .env.example
        required: false
      - path: .env
        required: false
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5420}:5432"
    volumes:
      - odt_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: odt-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    <<: *app-service
    container_name: odt-migrate
    restart: "no"
    # collectstatic runs here too: the bind-mount (.:/app) shadows the staticfiles
    # baked into the image, so assets must be regenerated into the host-mounted dir
    # on each deploy for WhiteNoise to serve /static/ (admin, DRF, Swagger CSS).
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput"
    depends_on:
      init_uploads:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    <<: *app-service
    container_name: odt-web
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "${WEB_HOST_BIND:-127.0.0.1}:${WEB_HOST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/admin/login/', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  celery_worker:
    <<: *app-service
    container_name: odt-celery-worker
    command: >
      celery -A OtwarteDaneTransportowe worker
      --loglevel=info
      --queues=default
      --concurrency=${CELERY_DEFAULT_CONCURRENCY:-2}
    depends_on:
      migrate:
        condition: service_completed_successfully

  celery_beat:
    <<: *app-service
    container_name: odt-celery-beat
    # DatabaseScheduler — harmonogram trzymany w PostgreSQL (tabela PeriodicTask)
    command: >
      celery -A OtwarteDaneTransportowe beat
      --loglevel=info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      migrate:
        condition: service_completed_successfully

  celery_validator_worker:
    <<: *app-service
    container_name: odt-celery-validator-worker
    # ┌──────────────────────────── SECURITY WARNING ─────────────────────────────┐
    # │ This worker mounts the host Docker socket to run the GTFS validator image. │
    # │ Access to /var/run/docker.sock is effectively ROOT on the host. A          │
    # │ compromise of this worker (e.g. via SSRF or a deserialization bug) lets an │
    # │ attacker control the host.                                                 │
    # │                                                                            │
    # │ Mitigations in place: the validator container runs with                    │
    # │ network_disabled, a non-root user, --rm, and bounded mem/pids/cpu limits   │
    # │ (see data_manager/tasks.py:validate_gtfs_feed_task).                       │
    # │                                                                            │
    # │ RECOMMENDED for production: replace the raw socket with a least-privilege  │
    # │ docker-socket-proxy (allow only container create/start/wait/remove), or    │
    # │ run the validator as a separate REST microservice, or use rootless Docker. │
    # └────────────────────────────────────────────────────────────────────────────┘
    # Needs host Docker API (group_add = docker.sock GID). Set in shell or .env:
    #   export DOCKER_GID=$(stat -c '%g' /var/run/docker.sock)
    # UID/GID = owner of uploaded_data (usually 1000). DOCKER_GID is separate —
    # do NOT set GID equal to DOCKER_GID or Compose rejects duplicate group_add.
    group_add:
      - "${DOCKER_GID:-959}"
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      celery -A OtwarteDaneTransportowe worker
      --loglevel=info
      --queues=feeds
      --concurrency=${CELERY_FEEDS_CONCURRENCY:-2}
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *app-env
      DOCKER_GID: "${DOCKER_GID:-959}"
      UID: "${UID:-1000}"
      GID: "${GID:-1000}"
      HOST_PROJECT_PATH: "${HOST_PROJECT_PATH:-${PWD}}"
      HOST_MEDIA_ROOT: "${HOST_MEDIA_ROOT:-${PWD}/uploaded_data}"

  gtfs-realtime-validator:
    image: ghcr.io/mobilitydata/gtfs-realtime-validator:latest
    container_name: gtfs-realtime-validator
    ports:
      - "127.0.0.1:${GTFS_REALTIME_VALIDATOR_HOST_PORT:-8082}:8080"
    restart: unless-stopped

volumes:
  odt_pgdata:
